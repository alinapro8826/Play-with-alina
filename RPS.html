<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors - Alina Vegas Pro</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background: radial-gradient(circle at center, #140522 0%, #05010a 100%); color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; text-align: center; }
        header { background: rgba(10, 2, 18, 0.95); display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; border-bottom: 3px solid #ff0077; box-shadow: 0 0 20px rgba(255, 0, 119, 0.4); }
        .logo { font-size: 24px; font-weight: 900; color: #00ffff; text-shadow: 0 0 10px #00ffff; letter-spacing: 1px; }
        nav { display: flex; align-items: center; }
        nav a { color: #ddd; text-decoration: none; margin: 0 12px; font-size: 15px; font-weight: bold; text-transform: uppercase; }
        nav a:hover { color: #ff0077; text-shadow: 0 0 10px #ff0077; }
        .deposit-blink { color: #ffcc00 !important; border: 1px solid #ffcc00; padding: 6px 14px; border-radius: 4px; }
        .nav-wallet-status { background: #1c0b30; padding: 8px 16px; border-radius: 20px; color: #00ff66; font-weight: bold; border: 1px solid #00ff66; font-size: 14px; }
        .game-card { background: #0d0217; max-width: 440px; margin: 40px auto; padding: 30px 20px; border-radius: 15px; border: 1px solid #ff0077; box-shadow: 0 0 25px rgba(255, 0, 119, 0.2); }
        h1 { color: #ffcc00; margin: 0 0 5px 0; font-size: 26px; }
        #status-board { font-size: 20px; margin: 20px 0; color: #00ffff; font-weight: bold; }
        .display-moves { display: flex; justify-content: space-around; font-size: 18px; color: #bbb; margin: 20px 0; background: #05010a; padding: 15px; border-radius: 8px; border: 1px solid #2d124d; }
        .display-moves span { font-size: 24px; display: block; margin-top: 5px; }
        .choices { display: flex; justify-content: space-around; margin: 30px 0; pointer-events: none; opacity: 0.4; }
        .choice-btn { font-size: 40px; background: #05010a; border: 2px solid #ff0077; border-radius: 50%; width: 85px; height: 85px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .choice-btn:hover { background: #1c0b30; border-color: #00ffff; box-shadow: 0 0 15px #00ffff; transform: scale(1.08); }
        .btn { background: linear-gradient(90deg, #00ff66, #00cccc); color: #000; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; width: 90%; box-shadow: 0 4px 15px rgba(0, 255, 102, 0.3); }
    </style>
</head>
<body>
<header>
    <div class="logo">🎰 ALINA VEGAS</div>
    <nav><a href="index.html">Home</a><a href="games.html">Games</a><a href="Deposit.html" class="deposit-blink">Add Funds</a><a href="Adminaprooval.html">Owner Panel</a></nav>
    <div class="nav-wallet-status"><i class="fa-solid fa-wallet"></i> Wallet: <span id="nav-wallet-display">$0.00</span></div>
</header>
<div class="game-card">
    <h1>✊ Rock-Paper-Scissors ✌️</h1>
    <div id="status-board">Click Play to Start!</div>
    <div class="display-moves">
        <div>You: <span id="user-move">-</span></div>
        <div>Bot: <span id="bot-move">-</span></div>
    </div>
    <div class="choices" id="choices-box">
        <button class="choice-btn" data-choice="rock">✊</button>
        <button class="choice-btn" data-choice="paper">🖐️</button>
        <button class="choice-btn" data-choice="scissors">✌️</button>
    </div>
    <button class="btn" id="start-btn">Play Game (Entry Fee: $0.10)</button>
</div>
<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, doc, onSnapshot, getDoc, updateDoc, addDoc, collection, serverTimestamp, increment } from "https://gstatic.com";
    import { getAuth, onAuthStateChanged } from "https://gstatic.com";

    const firebaseConfig = { apiKey: "AIzaSyCjZk8A8tJvUf4YmIkAy-g3_5YqhvW-3Bc", authDomain: "://firebaseapp.com", projectId: "playwithalina-d7bb3", storageBucket: "playwithalina-d7bb3.firebasestorage.app", messagingSenderId: "18244211359", appId: "1:18244211359:web:d10be09d3e9fbb184c88aa" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);

    const choicesBox = document.getElementById('choices-box'); const startBtn = document.getElementById('start-btn'); const choiceButtons = document.querySelectorAll('.choice-btn');

    onAuthStateChanged(auth, user => {
        if (user) {
            onSnapshot(doc(db, 'users', user.uid), docSnap => {
                if (docSnap.exists()) {
                    let balance = docSnap.data().walletBalance || 0;
                    document.getElementById('nav-wallet-display').innerText = '$' + balance.toFixed(2);
                }
            });
        }
    });

    startBtn.addEventListener('click', payAndStartGame);
    async function payAndStartGame() {
        const user = auth.currentUser; if (!user) return alert("Please Login First!");
        const userRef = doc(db, 'users', user.uid); const docSnap = await getDoc(userRef);
        const currentBalance = docSnap.data().walletBalance || 0; const entryFee = 0.10;
        if (currentBalance < entryFee) return alert("❌ Insufficient Funds!");

        try {
            await updateDoc(userRef, { walletBalance: currentBalance - entryFee });
            await addDoc(collection(db, 'transactions'), { userId: user.uid, type: 'RPS Game Entry', amount: entryFee, currency: 'USD', status: 'success', timestamp: serverTimestamp() });
            startBtn.disabled = true; choicesBox.style.pointerEvents = "auto"; choicesBox.style.opacity = "1"; document.getElementById('status-board').innerText = "Make your move!";
        } catch (err) { alert(err.message); }
    }

    choiceButtons.forEach(button => {
        button.addEventListener('click', (e) => {
            const btn = e.target.closest('.choice-btn'); const userChoice = btn.getAttribute('data-choice'); choicesBox.style.pointerEvents = "none";
            const botChoices = ['rock', 'paper', 'scissors']; const botChoice = botChoices[Math.floor(Math.random() * botChoices.length)];
            const emojis = { rock: "✊", paper: "🖐️", scissors: "✌️" };
            document.getElementById('user-move').innerText = emojis[userChoice]; document.getElementById('bot-move').innerText = emojis[botChoice];
            calculateResult(userChoice, botChoice);
        });
    });

    function calculateResult(user, bot) {
        if (user === bot) endGameResult("draw");
        else if ((user === "rock" && bot === "scissors") || (user === "paper" && bot === "rock") || (user === "scissors" && bot === "paper")) endGameResult("win");
        else endGameResult("lose");
    }

    async function endGameResult(result) {
        startBtn.disabled = false; choicesBox.style.opacity = "0.4"; const user = auth.currentUser;
        if (result === "win") {
            const prize = 0.25; document.getElementById('status-board').innerText = "🎉 You Won $0.25!";
            await updateDoc(doc(db, 'users', user.uid), { walletBalance: increment(prize) });
        } else if (result === "lose") { document.getElementById('status-board').innerText = "💀 Bot Won! Try Again."; }
        else { document.getElementById('status-board').innerText = "🤝 Match Draw!"; }
    }
</script>
</body>
</html>
