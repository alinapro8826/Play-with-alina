<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Arena - Alina Vegas Pro</title>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { 
            background: radial-gradient(circle at center, #140522 0%, #05010a 100%); 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            text-align: center;
        }

        /* Unified Premium Navbar */
        header {
            background: rgba(10, 2, 18, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 3px solid #ff0077;
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.4);
        }
        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            letter-spacing: 1px;
        }
        nav {
            display: flex;
            align-items: center;
        }
        nav a {
            color: #ddd;
            text-decoration: none;
            margin: 0 12px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        nav a:hover { color: #ff0077; text-shadow: 0 0 10px #ff0077; }
        
        .deposit-blink {
            color: #ffcc00 !important;
            border: 1px solid #ffcc00;
            padding: 6px 14px;
            border-radius: 4px;
            animation: neonBlink 1.5s infinite alternate;
        }
        @keyframes neonBlink { 0% { opacity: 0.8; } 100% { opacity: 1; box-shadow: 0 0 10px #ffcc00; } }
        
        .nav-wallet-status {
            background: #1c0b30;
            padding: 8px 16px;
            border-radius: 20px;
            color: #00ff66;
            font-weight: bold;
            border: 1px solid #00ff66;
            font-size: 14px;
        }

        /* Game Card Container */
        .game-card { 
            background: #0d0217; 
            max-width: 440px; 
            margin: 40px auto; 
            padding: 30px 20px; 
            border-radius: 15px; 
            border: 1px solid #ff0077;
            box-shadow: 0 0 25px rgba(255, 0, 119, 0.2); 
        }
        h1 { color: #ffcc00; margin: 0 0 5px 0; font-size: 26px; text-shadow: 0 0 10px rgba(255,204,0,0.2); }
        
        #status-board { font-size: 20px; margin: 20px 0; color: #00ffff; font-weight: bold; min-height: 30px; }
        
        /* Grid Layout Fixes */
        .board { 
            display: grid; 
            grid-template-columns: repeat(3, 95px); 
            grid-gap: 12px; 
            justify-content: center; 
            margin: 25px auto; 
            pointer-events: none; 
            opacity: 0.4; 
            transition: all 0.3s;
        }
        .cell { 
            width: 95px; 
            height: 95px; 
            background: #05010a; 
            border: 2px solid #ff0077; 
            border-radius: 12px; 
            font-size: 42px; 
            font-weight: 900; 
            line-height: 95px; 
            cursor: pointer; 
            color: #fff; 
            transition: 0.2s; 
            box-shadow: 0 0 8px rgba(255, 0, 119, 0.1);
        }
        .cell:hover { background: #1c0b30; border-color: #00ffff; box-shadow: 0 0 12px #00ffff; }
        
        .btn { 
            background: linear-gradient(90deg, #00ff66, #00cccc); 
            color: #000; 
            border: none; 
            padding: 12px 30px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 25px; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 90%;
            box-shadow: 0 4px 15px rgba(0, 255, 102, 0.3);
        }
        .btn:hover { opacity: 0.9; box-shadow: 0 4px 20px rgba(0, 255, 102, 0.5); }
        .btn:disabled { background: #333 !important; color: #777 !important; cursor: not-allowed; box-shadow: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo">🎰 ALINA VEGAS</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="games.html">Games</a>
        <a href="Deposit.html" class="deposit-blink">Add Funds</a>
        <a href="Adminaprooval.html">Owner Panel</a>
    </nav>
    <div class="nav-wallet-status"><i class="fa-solid fa-wallet"></i> Wallet: <span id="nav-wallet-display">$0.00</span></div>
</header>

<div class="game-card">
    <h1>❌ Tic-Tac-Toe Arena ⭕</h1>
    <div id="status-board">Click Play to Start!</div>
    
    <!-- Game Board Grid -->
    <div class="board" id="game-board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>
    
    <button class="btn" id="start-btn">Play Game (Entry Fee: $0.10)</button>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, doc, onSnapshot, getDoc, updateDoc, addDoc, collection, serverTimestamp, increment } from "https://gstatic.com";
    import { getAuth, onAuthStateChanged } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyCjZk8A8tJvUf4YmIkAy-g3_5YqhvW-3Bc",
        authDomain: "playwithalina-d7bb3.firebaseapp.com",
        projectId: "playwithalina-d7bb3",
        storageBucket: "playwithalina-d7bb3.firebasestorage.app",
        messagingSenderId: "18244211359",
        appId: "1:18244211359:web:d10be09d3e9fbb184c88aa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let boardState = ["", "", "", "", "", "", "", "", ""];
    let isGameActive = false;
    const cells = document.querySelectorAll('.cell');
    const boardElement = document.getElementById('game-board');

    onAuthStateChanged(auth, user => {
        if (user) {
            onSnapshot(doc(db, 'users', user.uid), docSnap => {
                if (docSnap.exists()) {
                    let balance = docSnap.data().walletBalance || 0;
                    document.getElementById('nav-wallet-display').innerText = '$' + balance.toFixed(2);
                }
            });
        }
    });

    document.getElementById('start-btn').addEventListener('click', payAndStartGame);

    async function payAndStartGame() {
        const user = auth.currentUser;
        if (!user) return alert("⚠️ Syncing account... If you aren't logged in, please open login.html first.");

        const userRef = doc(db, 'users', user.uid);
        const docSnap = await getDoc(userRef);
        const currentBalance = docSnap.data().walletBalance || 0;
        const entryFee = 0.10;

        if (currentBalance < entryFee) return alert("❌ Insufficient Funds! Please click 'Add Funds' to add balance.");

        try {
            await updateDoc(userRef, { walletBalance: currentBalance - entryFee });
            await addDoc(collection(db, 'transactions'), {
                userId: user.uid, type: 'Tic-Tac-Toe Entry', amount: entryFee, currency: 'USD', status: 'success', timestamp: serverTimestamp()
            });

            document.getElementById('start-btn').disabled = true;
            resetGame();
        } catch(err) {
            alert("Transaction Error: " + err.message);
        }
    }

    function resetGame() {
        boardState = ["", "", "", "", "", "", "", "", ""];
        isGameActive = true;
        boardElement.style.pointerEvents = "auto";
        boardElement.style.opacity = "1";
        document.getElementById('status-board').innerText = "Your Turn (X)";
        cells.forEach(cell => { cell.innerText = ""; cell.style.color = "#fff"; });
    }

    cells.forEach(cell => {
        cell.addEventListener('click', (e) => {
            const index = e.target.getAttribute('data-index');
            if (boardState[index] !== "" || !isGameActive) return;

            makeMove(index, "X", "#00ff66");
            if (checkWin("X")) return endGameResult("win");
            if (boardState.every(cell => cell !== "")) return endGameResult("draw");

            document.getElementById('status-board').innerText = "Bot is thinking...";
            boardElement.style.pointerEvents = "none";
            setTimeout(botMove, 400);
        });
    });

    function makeMove(index, player, color) {
        boardState[index] = player;
        cells[index].innerText = player;
        cells[index].style.color = color;
    }

    function botMove() {
        if (!isGameActive) return;
        let emptyCells = [];
        boardState.forEach((val, idx) => { if (val === "") emptyCells.push(idx); });
        
        if (emptyCells.length > 0) {
            let randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            makeMove(randomIndex, "O", "#ff3c00");
            if (checkWin("O")) return endGameResult("lose");
            if (boardState.every(cell => cell !== "")) return endGameResult("draw");
            
            document.getElementById('status-board').innerText = "Your Turn (X)";
            boardElement.style.pointerEvents = "auto";
        }
    }
