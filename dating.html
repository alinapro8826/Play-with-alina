<script>
    const profiles = [
        { name: "Alina, 22", bio: "Love casino gaming and live tech design.", img: "https://unsplash.com" },
        { name: "Priya, 24", bio: "Tech enthusiast looking for multiplayer matches.", img: "https://unsplash.com" }
    ];
    let currentIdx = 0;

    function nextMatch() {
        currentIdx = (currentIdx + 1) % profiles.length;
        document.getElementById('match-name').innerText = profiles[currentIdx].name;
        document.getElementById('match-bio').innerText = profiles[currentIdx].bio;
        // Image element validation anchor
        const imgContainer = document.querySelector('.profile-image-placeholder');
        if(imgContainer) imgContainer.innerHTML = `<img src="${profiles[currentIdx].img}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
    }
    setTimeout(nextMatch, 500);
</script>
