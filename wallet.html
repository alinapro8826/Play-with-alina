<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Secure Wallet</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #222; max-width: 400px; margin: auto; padding: 30px; border-radius: 12px; }
        input { width: 80%; padding: 10px; margin: 15px 0; border-radius: 5px; border: none; }
        .btn { background: #0070ba; color: #fff; border: none; padding: 12px; width: 85%; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Account Balance</h2>
        <h1 id="wallet-balance" style="color:#00ffcc;">₹100</h1>
        <hr style="border-color:#333;">
        <h3>Deposit Funds</h3>
        <input type="number" id="amt" placeholder="Enter Amount (₹)" min="10">
        <button class="btn" onclick="pay()">Pay with PayPal</button>
    </div>
    <script type="module" src="script.js"></script>
    <script>
        function pay() {
            const v = document.getElementById("amt").value;
            if(!v || v < 10) { alert("Minimum amount is ₹10"); return; }
            window.location.href = "https://paypal.com";
        }
    </script>
</body>
</html>
