<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Zone - Alina Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Play With Alina - Games Dashboard</h1>
            <div class="wallet-box">Wallet Balance: <span id="wallet-balance">Loading...</span></div>
        </header>

        <main class="games-grid">
            <!-- Game 1 -->
            <div class="game-card">
                <h3>Snake Game</h3>
                <p>Classic arcade snake game.</p>
                <a href="snake.html" class="play-btn">Start Game</a>
            </div>

            <!-- Game 2 -->
            <div class="game-card">
                <h3>Tic Tac Toe</h3>
                <p>Play X and O against logic.</p>
                <a href="tictactoe.html" class="play-btn">Start Game</a>
            </div>

            <!-- Game 3 -->
            <div class="game-card">
                <h3>2048 Puzzle</h3>
                <p>Join the numbers to win.</p>
                <a href="2048.html" class="play-btn">Start Game</a>
            </div>

            <!-- Dating Navigation -->
            <div class="game-card dating-card">
                <h3>Dating & Matching</h3>
                <p>Find matches and connect instantly.</p>
                <a href="dating.html" class="play-btn dating-btn">Open Dating</a>
            </div>
        </main>
    </div>

    <!-- Firebase Connections Javascript -->
    <script type="module" src="script.js"></script>
</body>
</html>
