<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alina Vegas - Secure Deposit</title>
    <style>
        body {
            background: #0d0b18;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .deposit-box {
            background: #1c1936;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff007f;
            box-shadow: 0 0 20px #ff007f;
            max-width: 340px;
            width: 90%;
        }
        .balance-glow {
            font-size: 32px;
            color: #00ffcc;
            font-weight: bold;
            text-shadow: 0 0 15px #00ffcc;
            margin-bottom: 20px;
        }
        /* 🔥 Attract Text & Banner Styles */
        .promo-banner {
            background: linear-gradient(45deg, #ffaa00, #ff007f);
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }
        .sub-promo {
            font-size: 12px;
            color: #ffaa00;
            margin-top: -5px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group input {
            width: 85%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #7f00ff;
            background: #0d0b18;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        .input-group input:focus {
            outline: none;
            border-color: #ff007f;
            box-shadow: 0 0 10px #ff007f;
        }
        .paypal-btn {
            display: block;
            width: 93%;
            background: #0070ba;
            color: #fff;
            padding: 14px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 112, 186, 0.4);
            transition: 0.2s;
        }
        .paypal-btn:hover {
            background: #005ea6;
            box-shadow: 0 0 15px #0070ba;
        }
        .notice {
            font-size: 11px;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="deposit-box">
        <!-- 🎯 Attracting Headlines -->
        <div class="promo-banner">🔥 INSTANT RECHARGE BONUS ACTIVED! 🔥</div>
        <h2 style="margin: 0 0 5px 0; color: gold;">Deposit Funds</h2>
        <p class="sub-promo">⚡ Load Wallet Fast & Play to Win 100% Instantly! 🚀</p>
        
        <div class="balance-glow">$10</div>

        <!-- Input Box Setup -->
        <div class="input-group">
            <input type="number" id="depositAmount" value="10" placeholder="Enter Amount ($)">
        </div>

        <!-- Action Button -->
        <button onclick="processDeposit()" class="paypal-btn">Pay with PayPal</button>
        
        <p class="notice">⚠️ Note: Minimum Deposit required is <b>$50</b> for game unlocks.</p>
    </div>

    <script>
        function processDeposit() {
            var amountInput = document.getElementById("depositAmount").value;
            var amount = parseFloat(amountInput);

            // 🚨 Minimum $50 Validation Check
            if (isNaN(amount) || amount < 50) {
                alert("❌ Deposit Failed! Minimum required deposit is $50 to instantly unlock winning algorithms.");
                return;
            }

            // Integration matrix setup triggers here
            alert("Proceeding to PayPal Secure Gateway to deposit: $" + amount);
            
            /* 
               Aapka PayPal Script Integration Logic yahan triggers hoga:
               currency: 'USD',
               value: amount
            */
        }
    </script>

</body>
</html>
