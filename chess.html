<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Master Arena</title>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; text-align: center; }
        .board { display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); justify-content: center; gap: 0; margin-top: 20px; border: 4px solid #333; }
        .square { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .white { background: #f0d9b5; color: #000; }
        .black { background: #b58863; color: #fff; }
    </style>
</head>
<body>
    <a href="games.html" style="color:#00ffcc;">← Back</a>
    <h1>♟️ INTEL CHESS ARENA</h1>
    <div class="board" id="b"></div>
    <script>
        let b = document.getElementById("b");
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                let color = (r + c) % 2 === 0 ? 'white' : 'black';
                let piece = (r===1) ? '♟️' : (r===6) ? '♙' : '';
                b.innerHTML += `<div class="square ${color}">${piece}</div>`;
            }
        }
    </script>
</body>
</html>
